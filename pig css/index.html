<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purceluș cu Easter Egg</title>
    <style>
      :root {
        --pig-skin: #ffb6c1;
        --pig-snout: #ff69b4;
        --blush: rgba(255, 105, 180, 0.6);
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #fdf2f4;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Mesajul pentru profesori */
      .hint {
        margin-top: 30px;
        color: #d14781;
        font-weight: bold;
        font-size: 1.2rem;
        padding: 10px 20px;
        border: 2px dashed #ff69b4;
        border-radius: 15px;
        animation: pulse-text 2s infinite;
      }

      @keyframes pulse-text {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.05);
        }
      }

      /* Container Purceluș */
      .pig-container {
        position: relative;
        width: 300px;
        height: 300px;
        cursor: pointer;
        transition: transform 0.1s active;
      }

      /* Capul */
      .pig-head {
        position: relative;
        width: 100%;
        height: 100%;
        background-color: var(--pig-skin);
        border: 8px solid #000;
        border-radius: 50%;
        z-index: 2;
        transition: all 0.3s ease;
      }

      /* Urechile */
      .ear {
        position: absolute;
        width: 80px;
        height: 80px;
        background-color: var(--pig-skin);
        border: 8px solid #000;
        border-radius: 50%;
        top: -10px;
        z-index: 1;
      }
      .ear.left {
        left: 20px;
      }
      .ear.right {
        right: 20px;
      }

      /* Ochii */
      .eye {
        position: absolute;
        width: 75px;
        height: 75px;
        background-color: white;
        border: 4px solid #000;
        border-radius: 50%;
        top: 70px;
        overflow: hidden;
        z-index: 3;
      }
      .eye.left {
        left: 50px;
      }
      .eye.right {
        right: 50px;
      }

      .pupil {
        position: absolute;
        width: 32px;
        height: 32px;
        background-color: #000;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      /* CLIPIT REALISTIC */
      .eyelid {
        position: absolute;
        top: -105%;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--pig-skin);
        border-bottom: 4px solid #000;
        z-index: 4;
        animation: realistic-blink 5s infinite;
      }

      @keyframes realistic-blink {
        0%,
        90%,
        94%,
        100% {
          top: -105%;
        }
        92% {
          top: 0%;
        } /* Clipit rapid */
        93% {
          top: -20%;
        } /* Deschidere parțială */
      }

      /* Râtul */
      .snout {
        position: absolute;
        width: 140px;
        height: 85px;
        background-color: var(--pig-snout);
        border: 6px solid #000;
        border-radius: 45px;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 0 20px;
        box-sizing: border-box;
        z-index: 5;
        transition: all 0.2s ease;
      }

      .nostril {
        width: 25px;
        height: 25px;
        background-color: #000;
        border-radius: 50%;
      }

      /* OBRAJI (Easter Egg) */
      .blush {
        position: absolute;
        width: 50px;
        height: 30px;
        background-color: var(--blush);
        border-radius: 50%;
        bottom: 90px;
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 4;
      }
      .blush.left {
        left: 45px;
      }
      .blush.right {
        right: 45px;
      }

      /* EFECTE LA CLICK (Easter Egg) */
      .pig-container:active {
        transform: scale(0.95);
      }

      .pig-container:active .blush {
        opacity: 1;
      }

      .pig-container:active .snout {
        transform: translateX(-50%) scale(1.1);
        background-color: #ff1493;
      }
    </style>
  </head>
  <body>
    <div class="pig-container">
      <div class="ear left"></div>
      <div class="ear right"></div>

      <div class="pig-head">
        <div class="eye left">
          <div class="eyelid"></div>
          <div class="pupil"></div>
        </div>
        <div class="eye right">
          <div class="eyelid"></div>
          <div class="pupil"></div>
        </div>

        <div class="blush left"></div>
        <div class="blush right"></div>

        <div class="snout">
          <div class="nostril"></div>
          <div class="nostril"></div>
        </div>
      </div>
    </div>

    <div class="hint">Apasă pe purceluș pentru un Easter Egg! 🐷</div>
  </body>
</html>
